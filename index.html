<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>Sales Quest — ล่าลูกค้าใหม่</title>

<!-- PWA: ติดตั้งลงหน้าจอโฮมได้เหมือนแอปจริง -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sales Quest">
<meta name="description" content="เกมเควสต์รายวัน ล่าลูกค้าใหม่ สำหรับทีมเซล MK Industrial Supply">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1020; --bg2:#131a33; --card:#1a2245; --card2:#222c57;
  --line:#2f3a6e;
  --tx:#eef2ff; --tx2:#a9b4dd; --tx3:#7683b5;
  --gold:#ffc53d; --green:#2fd67b; --red:#ff5c7a; --blue:#4da3ff; --purple:#a97bff; --orange:#ff8c42;
  --ok:#2fd67b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Noto Sans Thai',system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 50% -10%,#1d2757 0%,var(--bg) 55%) fixed,var(--bg);
  color:var(--tx); min-height:100vh; font-size:15px; line-height:1.5;
  padding-bottom:calc(78px + env(safe-area-inset-bottom));
}
.wrap{max-width:560px;margin:0 auto;
  padding:0 max(14px, env(safe-area-inset-right)) 0 max(14px, env(safe-area-inset-left))}
button{font-family:inherit;cursor:pointer;border:0;color:inherit}
input,select{font-family:inherit;font-size:15px}

/* ---------- header ---------- */
/* padding-top = ความสูงของรอยบาก/Dynamic Island บน iPhone
   (viewport-fit=cover ทำให้เนื้อหาไหลขึ้นไปใต้แถบสถานะ ถ้าไม่เว้นจะโดนบัง) */
header{position:sticky;top:0;z-index:40;backdrop-filter:blur(14px);
  background:linear-gradient(180deg,rgba(11,16,32,.96),rgba(11,16,32,.72));
  border-bottom:1px solid rgba(255,255,255,.07);
  padding-top:env(safe-area-inset-top,0px)}
/* ตั้งเฉพาะบน/ล่าง ไม่งั้นจะไปทับ padding ซ้าย-ขวาของ .wrap แล้วเนื้อหาชิดขอบจอ */
.hbar{display:flex;align-items:center;gap:8px;padding-top:9px;padding-bottom:9px;min-width:0}
.brand{width:30px;height:30px;border-radius:8px;flex:none;background:#fff;object-fit:contain;
  box-shadow:0 2px 8px rgba(0,0,0,.35)}
.logo{font-weight:900;font-size:16px;letter-spacing:.3px;white-space:nowrap;line-height:1.15;flex:none}
.logo span{color:var(--gold)}
.logo small{display:block;font-size:8.5px;font-weight:700;color:var(--tx3);letter-spacing:.3px}

/* แถบเชิญติดตั้งลงหน้าจอโฮม */
.install{display:flex;align-items:center;gap:12px;margin:12px 0 0;padding:13px 14px;border-radius:16px;
  background:linear-gradient(135deg,#26346b,#1a2245);border:1px solid rgba(77,163,255,.35)}
.install img{width:38px;height:38px;border-radius:10px;background:#fff;flex:none}
.install b{font-size:14px;display:block}
.install button{padding:10px 16px;border-radius:12px;font-weight:900;font-size:13px;flex:none;
  background:linear-gradient(135deg,var(--gold),var(--orange));color:#3a2200}
.install .x{background:none;color:var(--tx3);font-size:18px;padding:0 4px;box-shadow:none}
.who{margin-left:auto;display:flex;align-items:center;gap:7px;min-width:0;
  background:var(--card);border:1px solid rgba(255,255,255,.09);border-radius:999px;
  padding:5px 10px;font-weight:700;font-size:13.5px;flex:0 1 auto;overflow:hidden}
.who .av{width:23px;height:23px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:12px;font-weight:900;color:#0b1020}
.who .nm{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
.who .cv{font-size:10.5px;color:var(--tx3);display:block;overflow:hidden;text-overflow:ellipsis}
.sync{font-size:10.5px;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.12);
  color:var(--tx3);white-space:nowrap;flex:none}

/* จอแคบ (iPhone mini / SE) — ตัดของที่ไม่จำเป็นออกก่อนไม่ให้ล้นจนทับกัน */
@media (max-width:390px){
  .logo{font-size:14.5px}
  .logo small{display:none}
  .who .cv{display:none}
  .sync{font-size:0;padding:6px}
  .sync::before{content:'●';font-size:11px}
}
.sync.on{color:var(--green);border-color:rgba(47,214,123,.4);background:rgba(47,214,123,.1)}
.sync.off{color:var(--red);border-color:rgba(255,92,122,.5);background:rgba(255,92,122,.14);font-weight:800}
.sync.err{color:var(--red);border-color:rgba(255,92,122,.4);background:rgba(255,92,122,.1)}

/* ---------- generic ---------- */
.card{background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid rgba(255,255,255,.08);
  border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.h2{font-size:13px;font-weight:800;color:var(--tx3);letter-spacing:.6px;margin:20px 4px 10px;text-transform:uppercase}
.mut{color:var(--tx2)} .mut3{color:var(--tx3)}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800}
.hide{display:none!important}

/* ---------- streak ---------- */
.streak{display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#3a2410,#1a2245);border-color:rgba(255,197,61,.28)}
.fire{font-size:40px;line-height:1;filter:drop-shadow(0 0 14px rgba(255,140,66,.65))}
.fire.dead{filter:grayscale(1);opacity:.35}
.snum{font-size:34px;font-weight:900;line-height:1;color:var(--gold)}
.snum small{font-size:14px;color:var(--tx2);font-weight:700;margin-left:4px}
.badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;
  background:rgba(255,197,61,.15);color:var(--gold);border:1px solid rgba(255,197,61,.3)}
.bdg.locked{background:rgba(255,255,255,.05);color:var(--tx3);border-color:rgba(255,255,255,.08)}
.warn{margin-top:10px;font-size:12.5px;font-weight:700;color:var(--orange);
  background:rgba(255,140,66,.12);border:1px solid rgba(255,140,66,.3);border-radius:12px;padding:8px 11px}

/* ---------- quest ---------- */
.qhead{display:flex;align-items:center;gap:8px;margin:0 4px 10px}
.qhead b{font-size:16px}
.qpts{font-weight:900;color:var(--gold);font-size:15px}
/* ปุ่มเลื่อนดูสัปดาห์เก่า */
.wnav{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--tx2);
  border-radius:10px;width:32px;height:32px;flex:none;font-size:13px;line-height:1}
.wnav:active{transform:scale(.92)}
.wnav:disabled{opacity:.25}
/* กำลังดูอดีต — ทำให้รู้ว่าไม่ใช่สัปดาห์ปัจจุบัน */
.past .quest,.past .card{opacity:.92}
.past::before{content:'กำลังดูย้อนหลัง';display:block;text-align:center;font-size:11.5px;font-weight:700;
  color:var(--gold);background:rgba(255,197,61,.12);border:1px solid rgba(255,197,61,.3);
  border-radius:999px;padding:5px 10px;margin:0 4px 12px}
.quest{display:flex;align-items:center;gap:13px;padding:13px 14px;margin-bottom:10px;border-radius:16px;
  background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid rgba(255,255,255,.08);
  transition:.22s;position:relative;overflow:hidden}
.quest.done{border-color:rgba(47,214,123,.45);background:linear-gradient(160deg,#14351f,#132a2a)}
.quest.main{border-color:rgba(255,197,61,.35)}
.quest.main.done{border-color:rgba(47,214,123,.45)}
.qi{font-size:26px;width:34px;text-align:center;flex:none}
.qt{font-weight:800;font-size:14.5px}
.qs{font-size:12px;color:var(--tx3);margin-top:2px}
.bar{height:6px;background:rgba(255,255,255,.09);border-radius:99px;margin-top:7px;position:relative}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .5s cubic-bezier(.2,.9,.3,1)}
/* ขีดบอกตำแหน่ง "ขั้นต่ำ" บนแถบ */
.bar u{position:absolute;top:-3px;width:2px;height:12px;background:rgba(255,255,255,.55);border-radius:2px}
.quest.month{border-color:rgba(47,214,123,.4);background:linear-gradient(160deg,#14351f,#1a2245)}
.total{background:linear-gradient(150deg,#2a2350,#1a2245);border-color:rgba(255,197,61,.3)}
.quest.done .bar i{background:linear-gradient(90deg,var(--green),#7ee8a8)}
.quest.main .bar i{background:linear-gradient(90deg,var(--gold),var(--orange))}
.qb{flex:none;width:46px;height:46px;border-radius:14px;font-size:24px;font-weight:900;
  background:linear-gradient(160deg,#3350a8,#2a3f85);color:#fff;display:grid;place-items:center;
  box-shadow:0 4px 12px rgba(51,80,168,.4);transition:.15s}
.qb:active{transform:scale(.88)}
.quest.main .qb{background:linear-gradient(160deg,var(--gold),var(--orange));color:#3a2200;box-shadow:0 4px 14px rgba(255,160,60,.45)}
.quest.done .qb{background:linear-gradient(160deg,var(--green),#1fa85e);color:#04240f;box-shadow:0 4px 12px rgba(47,214,123,.35)}
/* อยู่ในแถวปกติ ไม่ใช้ position:absolute — เดิมวางตายตัวที่ right:70px แล้วไปทับปุ่มกด */
.minus{width:28px;height:28px;flex:none;border-radius:9px;
  background:rgba(255,255,255,.07);color:var(--tx3);font-size:16px;font-weight:900;display:grid;place-items:center;opacity:.6}
.minus:active{opacity:1;transform:scale(.9)}
.clear{text-align:center;padding:15px;border-radius:16px;font-weight:900;
  background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.15);color:var(--tx3);font-size:14px}
.clear.on{background:linear-gradient(135deg,#1f5b38,#2a7d4d);border:1px solid var(--green);color:#fff;
  box-shadow:0 0 26px rgba(47,214,123,.35)}

/* ---------- เตือนยังไม่ได้เชื่อมข้อมูลส่วนกลาง ---------- */
.offline{background:linear-gradient(150deg,#3d1230,#1a2245);border-color:rgba(255,92,122,.45)}
.offline .x{background:none;color:var(--tx3);font-size:17px;padding:2px 4px;flex:none;opacity:.6;align-self:flex-start}
.offline .x:active{opacity:1}

/* ---------- ตามผลลูกค้า ---------- */
.nudge{background:linear-gradient(150deg,#3a2f10,#1a2245);border-color:rgba(255,197,61,.35)}
.due{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 12px;
  border-radius:13px;margin-bottom:7px;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08)}
.due:active{transform:scale(.99)}
.due b{font-size:14px}

/* ---------- การ์ดลูกค้า ---------- */
.lead{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:12px 13px;
  border-radius:15px;margin-bottom:8px;
  background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid rgba(255,255,255,.08)}
.lead:active{transform:scale(.99)}
.lead .dot{width:10px;height:10px;border-radius:50%;flex:none}
.lead b{font-size:14.5px;display:block}
.lead .meta{font-size:11.5px;color:var(--tx3);margin-top:2px}
.lead .age{font-size:11px;flex:none;padding:3px 9px;border-radius:999px;
  background:rgba(255,255,255,.06);color:var(--tx3);white-space:nowrap}
.lead .age.hot{background:rgba(255,92,122,.18);color:var(--red)}

/* ---------- funnel ---------- */
.fn{display:flex;align-items:center;gap:10px;padding:8px 0}
.fn .fi{font-size:17px;width:26px;text-align:center;flex:none}
.fn .fl{font-size:13px;flex:none;width:118px}
.fn .fb{flex:1;height:20px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.fn .fb i{display:block;height:100%;border-radius:6px;transition:width .6s cubic-bezier(.2,.9,.3,1)}
.fn .fv{font-size:13px;font-weight:900;width:30px;text-align:right;flex:none}

/* ---------- timeline ---------- */
.tl{position:relative;padding-left:26px;margin-top:4px}
.tl::before{content:'';position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:rgba(255,255,255,.12)}
.tl .ti{position:relative;padding:7px 0;font-size:13px}
.tl .ti::before{content:'';position:absolute;left:-22px;top:13px;width:9px;height:9px;border-radius:50%;
  background:var(--card2);border:2px solid var(--tx3)}
.tl .ti.now::before{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px rgba(255,197,61,.6)}

/* ---------- boss ---------- */
.boss{background:linear-gradient(150deg,#3d1230,#1a2245);border-color:rgba(255,92,122,.3)}
.bossbar{height:26px;border-radius:99px;background:rgba(0,0,0,.4);overflow:hidden;position:relative;margin:12px 0 8px;
  border:1px solid rgba(255,255,255,.12)}
.bossbar i{display:block;height:100%;background:linear-gradient(90deg,#ff5c7a,#ff8c42,var(--gold));
  transition:width .8s cubic-bezier(.2,.9,.3,1);box-shadow:0 0 18px rgba(255,140,66,.6)}
.bossbar b{position:absolute;inset:0;display:grid;place-items:center;font-size:12.5px;font-weight:900;
  text-shadow:0 1px 4px rgba(0,0,0,.85)}
.kpi{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.kpi div{background:rgba(0,0,0,.28);border-radius:12px;padding:9px 6px;text-align:center}
.kpi b{display:block;font-size:17px;font-weight:900;color:var(--gold)}
.kpi span{font-size:10.5px;color:var(--tx3);display:block;margin-top:2px;line-height:1.3}

/* ---------- leaderboard ---------- */
.seg{display:flex;gap:5px;background:rgba(0,0,0,.3);padding:4px;border-radius:12px;margin-bottom:12px}
.seg button{flex:1;padding:8px;border-radius:9px;font-weight:800;font-size:13px;background:none;color:var(--tx3)}
.seg button.on{background:var(--card2);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.lb{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:15px;margin-bottom:9px;
  background:linear-gradient(160deg,var(--card),var(--bg2));border:1px solid rgba(255,255,255,.08)}
.lb.p1{border-color:rgba(255,197,61,.5);background:linear-gradient(160deg,#3a2f10,#1e2445)}
.rk{font-size:22px;width:32px;text-align:center;flex:none;font-weight:900}
.av2{width:38px;height:38px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-weight:900;font-size:15px;color:#0b1020}
.lbn{font-weight:800;font-size:15px}
.lbs{font-size:11.5px;color:var(--tx3);margin-top:1px}
.lbp{margin-left:auto;text-align:right;flex:none}
.lbp b{font-size:19px;font-weight:900;color:var(--gold);display:block;line-height:1.1}
.lbp span{font-size:10px;color:var(--tx3)}

/* ---------- summary ---------- */
pre.sum{white-space:pre-wrap;word-break:break-word;font-family:'Noto Sans Thai',sans-serif;font-size:13.5px;
  background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:14px;margin:0;line-height:1.65}
.copy{width:100%;padding:14px;border-radius:14px;font-weight:900;font-size:15px;margin-top:10px;
  background:linear-gradient(135deg,#06c755,#04a145);color:#fff;box-shadow:0 6px 18px rgba(6,199,85,.3)}
.copy:active{transform:scale(.98)}

/* ---------- log list ---------- */
.log{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13.5px}
.log:last-child{border:0}
.log .li{font-size:17px;flex:none;width:24px;text-align:center}
.log b{font-weight:700}
.log .lt{margin-left:auto;font-size:11px;color:var(--tx3);flex:none;white-space:nowrap}
.del{background:none;color:var(--tx3);font-size:15px;padding:4px 5px;flex:none;opacity:.55}
.del:active{opacity:1;transform:scale(.9)}
.adv{display:flex;align-items:center;gap:8px;width:100%;padding:15px 16px;background:none;
  font-weight:800;font-size:13.5px;color:var(--tx2)}
.gohand{cursor:pointer}
.gohand:active b{color:var(--gold)}

/* ---------- nav ---------- */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(13,18,38,.97);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08);
  padding-bottom:env(safe-area-inset-bottom)}
.nb{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr)}
.nb button{padding:10px 2px 11px;background:none;color:var(--tx3);font-size:10px;font-weight:800;
  display:flex;flex-direction:column;align-items:center;gap:3px;transition:.15s;position:relative}
.nb .badge{position:absolute;top:5px;left:50%;margin-left:6px;min-width:17px;height:17px;padding:0 4px;
  border-radius:99px;background:var(--red);color:#fff;font-size:10px;font-weight:900;
  display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.nb button i{font-style:normal;font-size:21px;line-height:1}
.nb button.on{color:var(--gold)}
.nb button.on i{transform:translateY(-1px);filter:drop-shadow(0 0 10px rgba(255,197,61,.5))}

/* ---------- modal ---------- */
.mask{position:fixed;inset:0;z-index:100;background:rgba(4,7,18,.8);backdrop-filter:blur(5px);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.modal{width:100%;max-width:560px;background:linear-gradient(180deg,var(--card2),var(--bg2));
  border-radius:24px 24px 0 0;padding:22px 18px calc(24px + env(safe-area-inset-bottom));
  border-top:1px solid rgba(255,255,255,.14);animation:up .28s cubic-bezier(.2,.9,.3,1);
  max-height:calc(92vh - env(safe-area-inset-top,0px));overflow:auto}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.mt{font-size:18px;font-weight:900;margin:0 0 4px}
.ms{font-size:13px;color:var(--tx3);margin:0 0 16px}
label{display:block;font-size:12px;font-weight:800;color:var(--tx3);margin:12px 0 5px}
.inp{width:100%;padding:13px 14px;border-radius:13px;background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.13);color:var(--tx);outline:none}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,163,255,.15)}
.btns{display:flex;gap:9px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:14px;font-weight:900;font-size:15px;
  background:linear-gradient(135deg,var(--blue),#3a6fd8);color:#fff}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#3a2200}
.btn.gh{background:rgba(255,255,255,.07);color:var(--tx2);flex:0 0 34%}
.btn:active{transform:scale(.98)}
.pick{display:flex;align-items:center;gap:12px;width:100%;padding:13px;border-radius:14px;margin-bottom:8px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);text-align:left}
.pick.on{border-color:var(--gold);background:rgba(255,197,61,.12)}

/* ---------- fx ---------- */
/* ต้องบวก safe-area ไม่งั้นเด้งไปอยู่ใต้รอยบาก/Dynamic Island แล้วมองไม่เห็น */
.toast{position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top,0px));transform:translateX(-50%);z-index:200;
  background:linear-gradient(135deg,#2fd67b,#1fa85e);color:#04240f;font-weight:900;font-size:14px;
  padding:11px 20px;border-radius:999px;box-shadow:0 8px 26px rgba(0,0,0,.4);animation:pop .3s;white-space:nowrap}
.toast.gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#3a2200}

<script>
'use strict';
/* =====================================================================
   Sales Quest — data layer แยกชัด (localStorage + Google Sheet sync)
   ===================================================================== */

const DEFAULTS = {
  reps: [
    { id:'tum',   name:'ตั้ม',    role:'โรงงาน',       color:'#7c3aed', private:true },
    { id:'korn',  name:'พี่กร',   role:'อู่ / เทคนิค', color:'#ffc53d' },

  ],
  goal: { baseline:50000000, target:100000000, conversion:15, avgDeal:150000 },

  // ⚠️ ห้ามใส่ URL/โทเคนตรงนี้แล้ว commit ขึ้น GitHub — repo เป็น public ใครก็อ่านได้
  // ตั้งค่าผ่าน "ลิงก์ตั้งค่า" แทน (แท็บตั้งค่า → แชร์ลิงก์ตั้งค่า) แล้วเก็บลง localStorage ของแต่ละเครื่อง
  syncUrl: '',
  syncToken: ''
};

/* เป้าเป็น "รายสัปดาห์" (จันทร์–อาทิตย์)
   min = ขั้นต่ำที่ต้องทำให้ได้  |  max = เป้าเยี่ยม ทำถึงแล้วได้โบนัสพิเศษ
   types = ชนิดกิจกรรมที่นับเข้าเควสต์นี้ (เข้าพบกับเสนอราคานับรวมกัน) */
/* เป้ารายสัปดาห์ (จันทร์–อาทิตย์) — งานที่เซลคุมเองได้ */
const QUESTS = [
  { id:'lead',   icon:'🎯', title:'ทักลูกค้าใหม่',        min:12, max:20, pts:10, main:true,
    sub:'ภารกิจหลัก', types:['lead'] },
  { id:'meet',   icon:'📅', title:'เข้าพบ',               min:4,  max:8,  pts:15,
    sub:'เข้าไปพบถึงที่', types:['meet'] },
  { id:'follow', icon:'🔄', title:'ตามลูกค้าเก่าที่เงียบ',  min:5,  max:10, pts:5,
    sub:'เจ้าที่ไม่ได้ซื้อนาน', types:['follow'] },
  { id:'quote',  icon:'💰', title:'เสนอราคา',             min:3,  max:6,  pts:15,
    sub:'ส่งใบเสนอราคา/โชว์สินค้า', types:['quote'] }
];

/* เป้ารายเดือน — ปิดดีลใช้เวลากว่าจะสุก วัดรายสัปดาห์จะสุ่มเกินไป */
const MONTHLY = {
  id:'win', icon:'🏆', title:'ปิดดีลลูกค้าใหม่', min:7, max:12, pts:40,
  sub:'นับจากลูกค้าที่มาร์ก "ปิดได้"'
};

const BONUS = 50;        // โบนัสเมื่อครบขั้นต่ำทุกเควสต์ในสัปดาห์
const MAX_BONUS = 50;    // โบนัสเพิ่มเมื่อถึงเป้าเยี่ยมทุกเควสต์
const MONTH_BONUS = 200; // โบนัสเมื่อปิดดีลครบเป้าเดือน
const MILESTONES = [4, 12, 26];   // สัปดาห์ติดกัน ≈ 1 เดือน / 3 เดือน / ครึ่งปี
const QMAP = Object.fromEntries(QUESTS.map(q => [q.id, q]));

/* ชนิดกิจกรรม -> เควสต์ที่มันนับเข้า */
const TYPE2QUEST = {};
QUESTS.forEach(q => q.types.forEach(t => TYPE2QUEST[t] = q));

/* ป้ายชื่อของแต่ละชนิดกิจกรรม (ใช้ตอนบันทึก/แสดงประวัติ) */
const ACTS = {
  lead:   { icon:'🎯', title:'ทักลูกค้าใหม่' },
  meet:   { icon:'📅', title:'เข้าพบ / นัดหมาย' },
  quote:  { icon:'💰', title:'เสนอราคา / โชว์สินค้า' },
  follow: { icon:'🔄', title:'ตามลูกค้าเก่า' },
  /* สองอันล่างมาจากไลน์เท่านั้น — ส่งตัวอย่างไม่มีเป้า เพราะแจกของฟรีวัดผลไม่ได้ */
  sample: { icon:'🧪', title:'ส่งตัวอย่าง' },
  won:    { icon:'🏆', title:'ปิดดีล' }
};

/* ขั้นตอนการขาย — ลูกค้า 1 เจ้าเดินผ่านขั้นพวกนี้
   open = ยังตามอยู่ / won = ปิดได้ / dead = จบแล้ว ไม่ได้ */
const STAGES = [
  { id:'new',     icon:'🆕', label:'ทักแล้ว รอผล',      color:'#4da3ff', open:true },
  { id:'talked',  icon:'💬', label:'ได้คุยแล้ว',         color:'#4da3ff', open:true },
  { id:'visited', icon:'🏭', label:'ได้เข้าโรงงาน',      color:'#a97bff', open:true },
  { id:'sample',  icon:'🧪', label:'ส่งตัวอย่าง/ทดสอบ',  color:'#ff8c42', open:true },
  { id:'quoted',  icon:'💰', label:'เสนอราคาแล้ว',       color:'#ffc53d', open:true },
  { id:'won',     icon:'✅', label:'ปิดได้',             color:'#2fd67b', won:true  },
  { id:'lost',    icon:'❌', label:'ไม่ได้',             color:'#ff5c7a', dead:true },
  { id:'noreach', icon:'☎️', label:'ติดต่อไม่ได้',       color:'#7683b5', dead:true }
];
const SMAP = Object.fromEntries(STAGES.map(s => [s.id, s]));

const LOSS_REASONS = [
  'มีเจ้าประจำอยู่แล้ว',
  'ราคาแพงกว่าเจ้าเดิม',
  'ติดต่อไม่ได้เลย',
  'ไม่ได้เจอคนตัดสินใจ',
  'ยังไม่มีความต้องการตอนนี้',
  'สินค้าไม่ตรงสเปค',
  'อื่นๆ'
];

const NUDGE_DAYS = 3;   // ทักไปแล้วกี่วันถึงจะเตือนให้อัปเดต

/* ---------------- Store: อนาคตเปลี่ยนไปใช้ DB จริงแก้แค่ชั้นนี้ ------------- */
const Store = {
  K_E:'sq_entries', K_C:'sq_config', K_U:'sq_user', K_Q:'sq_queue',

  // รายชื่อ/สีของทีมยึดจากโค้ดเสมอ ไม่เก็บลงเครื่อง
  // ไม่งั้นค่าเก่าที่เคยบันทึกไว้จะทับของใหม่ แล้วแก้สี/ชื่อในโค้ดเท่าไหร่ก็ไม่ขึ้น
  cfg(){
    const saved = JSON.parse(localStorage.getItem(this.K_C) || '{}');
    delete saved.reps;
    return Object.assign({}, DEFAULTS, saved);
  },
  saveCfg(c){
    const out = Object.assign({}, c);
    delete out.reps;
    localStorage.setItem(this.K_C, JSON.stringify(out));
  },

  entries(){ return JSON.parse(localStorage.getItem(this.K_E) || '[]'); },
  setEntries(a){ localStorage.setItem(this.K_E, JSON.stringify(a)); },

  user(){ return localStorage.getItem(this.K_U) || ''; },
  setUser(u){ localStorage.setItem(this.K_U, u); },

  queue(){ return JSON.parse(localStorage.getItem(this.K_Q) || '[]'); },
  setQueue(a){ localStorage.setItem(this.K_Q, JSON.stringify(a)); },

  add(e){
    e.id = e.id || (Date.now().toString(36) + Math.random().toString(36).slice(2,7));
    e.ts = e.ts || Date.now();
    const a = this.entries(); a.push(e); this.setEntries(a);
    const q = this.queue(); q.push(e); this.setQueue(q);
    Sync.push();
    return e;
  },
  /* แก้ไขรายการที่บันทึกไปแล้ว — ทำเครื่องหมาย edited เพื่อให้ฝั่งชีทเขียนทับแถวเดิม
     (ปกติชีทจะข้าม id ที่มีอยู่แล้ว เพื่อกันบันทึกซ้ำตอนซิงก์) */
  update(id, patch){
    const a = this.entries();
    const i = a.findIndex(e => e.id === id);
    if (i < 0) return null;
    Object.assign(a[i], patch, { edited: true });
    this.setEntries(a);
    const q = this.queue(); q.push(Object.assign({}, a[i])); this.setQueue(q);
    Sync.push();
    return a[i];
  },
  remove(id){
    this.setEntries(this.entries().filter(e => e.id !== id));
    const e = { id, deleted:true, ts:Date.now() };
    const q = this.queue(); q.push(e); this.setQueue(q);
    Sync.push();
  },
  merge(remote){
    const local = this.entries();
    const seen = new Set(local.map(e => e.id));
    let n = 0;
    remote.forEach(r => {
      if (r.deleted) return;
      if (!seen.has(r.id)) { local.push(r); seen.add(r.id); n++; }
    });
    if (n) this.setEntries(local);
    return n;
  }
};

/* ---------------- Sync: Google Sheet ผ่าน Apps Script Web App --------------- */
const Sync = {
  busy:false, state:'off',

  badge(s, txt){
    this.state = s;
    const el = document.getElementById('syncBadge');
    el.className = 'sync ' + s;
    el.textContent = txt;
  },

  async pull(silent){
    const c = Store.cfg(), url = c.syncUrl;
    if (!url) { this.badge('off','⚠️ ยังไม่เชื่อม'); return; }
    try{
      this.badge('on','กำลังซิงก์…');
      const q = 'action=list&token=' + encodeURIComponent(c.syncToken) + '&t=' + Date.now();
      const r = await fetch(url + (url.includes('?') ? '&' : '?') + q);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'bad response');
      const n = Store.merge(j.entries || []);
      this.badge('on','ซิงก์แล้ว');
      if (!silent && n) toast('ดึงข้อมูลใหม่ ' + n + ' รายการ');
      render();
    }catch(err){
      this.badge('err','ซิงก์ไม่ได้');
      if (!silent) toast('เชื่อม Google Sheet ไม่ได้');
    }
  },

  async push(){
    const c = Store.cfg(), url = c.syncUrl;
    if (!url || this.busy) return;
    const q = Store.queue();
    if (!q.length) return;
    this.busy = true;
    try{
      const r = await fetch(url, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // เลี่ยง CORS preflight
        body: JSON.stringify({ action:'save', token:c.syncToken, entries:q })
      });
      const j = await r.json();
      if (!j.ok) throw new Error('save failed');
      Store.setQueue(Store.queue().slice(q.length));
      this.badge('on','ซิงก์แล้ว');
    }catch(err){
      this.badge('err','ค้างส่ง ' + Store.queue().length);
    }finally{
      this.busy = false;
      // มีรายการเข้าคิวระหว่างที่กำลังส่ง → ส่งต่อเลย ไม่ต้องรอรอบถัดไป
      if (Store.queue().length) setTimeout(() => this.push(), 300);
    }
  }
};

/* ---------------- helpers ---------------- */
const $  = s => document.querySelector(s);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const today = () => new Date().toLocaleDateString('sv-SE');   // YYYY-MM-DD ตามเวลาเครื่อง
const dayAgo = n => { const d = new Date(); d.setDate(d.getDate()-n); return d.toLocaleDateString('sv-SE'); };
const baht = n =>
    n >= 1000000 ? (n/1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'ล.'
  : n >= 100000  ? (n/100000).toFixed(n % 100000 === 0 ? 0 : 1) + ' แสน'
  : n >= 10000   ? (n/10000).toFixed(n % 10000 === 0 ? 0 : 1) + ' หมื่น'
  : n >= 1000    ? (n/1000).toFixed(n % 1000 === 0 ? 0 : 1) + ' พัน'
  : String(Math.round(n));
const thDate = d => new Date(d+'T00:00:00').toLocaleDateString('th-TH',{day:'numeric',month:'short'});

let TAB = 'quest', LBRANGE = 'week', LEADVIEW = 'due', ADV = false;
const cfg  = () => Store.cfg();
const reps = () => cfg().reps;
const rep  = id => reps().find(r => r.id === id);
const publicReps = () => reps().filter(r => !r.private);
const me = () => rep(Store.user());

/* เลือกสีตัวอักษรบนพื้นสีโปรไฟล์ — สีเข้มใช้ตัวขาว สีสว่างใช้ตัวดำ จะได้อ่านออกทุกสี */
function txtOn(hex){
  const c = String(hex).replace('#','');
  const r = parseInt(c.slice(0,2),16), g = parseInt(c.slice(2,4),16), b = parseInt(c.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) > 150 ? '#0b1020' : '#ffffff';
}

function toast(msg, gold){
  const t = document.createElement('div');
  t.className = 'toast' + (gold ? ' gold' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  // จางหายอยู่กับที่ (ไม่ลอยขึ้น) จะได้ไม่ไปโผล่ใต้ Dynamic Island ตอนจบ
  setTimeout(() => { t.style.transition='.3s'; t.style.opacity='0'; t.style.transform='translate(-50%,0) scale(.92)'; }, 1500);
  setTimeout(() => t.remove(), 1850);
}
function confetti(){
  const em = ['🎉','⭐','🔥','💥','🏆','✨'];
  for (let i=0;i<26;i++){
    const c = document.createElement('div');
    c.className = 'conf';
    c.textContent = em[i % em.length];
    c.style.left = Math.random()*100 + 'vw';
    c.style.top = '-40px';
    c.style.animationDuration = (1.5 + Math.random()*1.4) + 's';
    c.style.animationDelay = (Math.random()*.35) + 's';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3400);
  }
}

/* ---------------- สัปดาห์ (จันทร์–อาทิตย์) ---------------- */
/* offset 0 = สัปดาห์นี้, 1 = สัปดาห์ที่แล้ว, ... */
function weekStart(offset){
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7) - (offset||0) * 7);   // ย้อนไปวันจันทร์
  return d;
}
function weekDates(offset){
  const s = weekStart(offset), out = [];
  for (let i=0;i<7;i++){
    const d = new Date(s); d.setDate(s.getDate()+i);
    if (d > new Date()) break;                    // ยังไม่ถึงวันนั้น ไม่ต้องนับ
    out.push(d.toLocaleDateString('sv-SE'));
  }
  return out;
}
const weekLabel = offset =>
  thDate(weekStart(offset).toLocaleDateString('sv-SE')) + ' – ' +
  thDate(new Date(weekStart(offset).getTime() + 6*86400000).toLocaleDateString('sv-SE'));

/* ---------------- คำนวณคะแนน / เควสต์ / streak ---------------- */
function countOf(repId, date, type){
  return Store.entries().filter(e => e.rep===repId && e.date===date && e.type===type).length;
}
/* จำนวนที่ทำได้ในสัปดาห์นั้น ของเควสต์หนึ่ง (รวมทุกชนิดที่นับเข้าเควสต์นี้) */
function questCount(repId, quest, offset){
  const days = weekDates(offset);
  return Store.entries().filter(e =>
    e.rep === repId && days.includes(e.date) && quest.types.includes(e.type)).length;
}
/* จำนวนกิจกรรมชนิดหนึ่งในสัปดาห์ */
function typeCount(repId, type, offset){
  const days = weekDates(offset);
  return Store.entries().filter(e =>
    e.rep === repId && days.includes(e.date) && e.type === type).length;
}

const hitMin = (repId, offset) => QUESTS.every(q => questCount(repId,q,offset) >= q.min);
const hitMax = (repId, offset) => QUESTS.every(q => questCount(repId,q,offset) >= q.max);

/* แต้มของสัปดาห์ = แต้มต่อชิ้น + โบนัสครบขั้นต่ำ + โบนัสถึงเป้าเยี่ยม */
function weekPoints(repId, offset){
  let p = 0;
  QUESTS.forEach(q => { p += questCount(repId,q,offset) * q.pts; });
  if (hitMin(repId,offset)) p += BONUS;
  if (hitMax(repId,offset)) p += MAX_BONUS;
  return p;
}

/* สัปดาห์ติดกันที่ทำครบขั้นต่ำ — สัปดาห์นี้ที่ยังไม่จบ ไม่นับว่าขาด */
function streakOf(repId){
  let n = 0;
  for (let i=0;i<120;i++){
    if (hitMin(repId,i)) n++;
    else if (i > 0) break;
  }
  return n;
}

/* รวมแต้มหลายสัปดาห์ (ใช้ในตารางอันดับ) */
function rangePoints(repId, weeks){
  let p = 0;
  for (let i=0;i<weeks;i++) p += weekPoints(repId,i);
  return p;
}
function rangeCount(repId, weeks, type){
  let n = 0;
  for (let i=0;i<weeks;i++) n += typeCount(repId,type,i);
  return n;
}
const weeksThisMonth = () => Math.ceil(new Date().getDate() / 7);

/* ---------------- เดือน (สำหรับเป้าปิดดีล) ---------------- */
function monthKey(offset){
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() - (offset||0));
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
const monthLabel = offset => {
  const [y,m] = monthKey(offset).split('-');
  return new Date(+y, +m-1, 1).toLocaleDateString('th-TH',{month:'long', year:'numeric'});
};

/* จำนวนดีลที่ปิดได้ในเดือนนั้น — นับจากลูกค้าที่ถูกมาร์กเป็น "ปิดได้" */
/* "ปิดได้" มาได้ 3 ทาง: กดปุ่มในแอป (deal) · มาร์กสถานะเป็นปิดได้ (status/won)
   · น้องเควสจดมาจากไลน์ (type won) */
const isWon = e => e.type === 'deal' || e.type === 'won'
              || (e.type === 'status' && e.stage === 'won');

function winCount(repId, offset){
  const mk = monthKey(offset);
  return Store.entries().filter(e =>
    e.rep === repId && isWon(e) &&
    String(e.date).slice(0,7) === mk).length;
}
const hitMonthMin = (repId, offset) => winCount(repId, offset) >= MONTHLY.min;
const hitMonthMax = (repId, offset) => winCount(repId, offset) >= MONTHLY.max;

function monthPoints(repId, offset){
  const n = winCount(repId, offset);
  return n * MONTHLY.pts + (n >= MONTHLY.min ? MONTH_BONUS : 0);
}

/* ---------------- แต้มสะสม (ไม่รีเซ็ต ไว้แลกของ) ---------------- */
/* นับตั้งแต่รายการแรกจนถึงตอนนี้ */
function weeksSinceStart(repId){
  const es = Store.entries().filter(e => e.rep === repId);
  if (!es.length) return 0;
  const first = es.reduce((m,e) => e.date < m ? e.date : m, es[0].date);
  const diff = weekStart(0) - new Date(first + 'T00:00:00');
  return Math.max(1, Math.floor(diff / (7*86400000)) + 1);
}
function totalPoints(repId){
  let p = 0;
  const w = Math.min(260, weeksSinceStart(repId));      // กันวนนานเกินไป
  for (let i=0;i<w;i++) p += weekPoints(repId,i);
  for (let i=0;i<Math.ceil(w/4)+1;i++) p += monthPoints(repId,i);
  return p;
}

/* =====================================================================
   Lead: ลูกค้า 1 เจ้า = entry type 'lead' หนึ่งอัน
   การอัปเดตสถานะ = entry type 'status' ที่ ref กลับไปหา lead นั้น
   (เก็บแบบ append-only เพื่อให้ซิงก์กับ Google Sheet ง่ายและตรวจย้อนหลังได้)
   ===================================================================== */
const Lead = {
  all(repId){
    return Store.entries()
      .filter(e => e.type === 'lead' && (!repId || e.rep === repId))
      .sort((a,b) => b.ts - a.ts);
  },

  /* ประวัติการอัปเดตของลูกค้าเจ้านี้ เรียงเก่า→ใหม่ */
  history(leadId){
    return Store.entries()
      .filter(e => e.type === 'status' && e.ref === leadId)
      .sort((a,b) => a.ts - b.ts);
  },

  /* สถานะล่าสุด — ยังไม่เคยอัปเดต = 'new' */
  stage(leadId){
    const h = this.history(leadId);
    return h.length ? (h[h.length-1].stage || 'new') : 'new';
  },

  /* อัปเดตล่าสุดเมื่อไหร่ (ถ้าไม่เคยอัปเดต ใช้เวลาที่ทัก) */
  lastTouch(lead){
    const h = this.history(lead.id);
    return h.length ? h[h.length-1].ts : lead.ts;
  },

  daysSince(lead){
    return Math.floor((Date.now() - this.lastTouch(lead)) / 86400000);
  },

  isOpen(leadId){
    const s = SMAP[this.stage(leadId)];
    return !!(s && s.open);
  },

  /* เจ้าที่ยังไม่จบ และเงียบมาเกิน NUDGE_DAYS วัน — ต้องตามอัปเดต */
  needUpdate(repId){
    return this.all(repId)
      .filter(l => this.isOpen(l.id) && this.daysSince(l) >= NUDGE_DAYS)
      .sort((a,b) => this.lastTouch(a) - this.lastTouch(b));   // เงียบนานสุดขึ้นก่อน
  },

  /* เจ้าที่ยังตามอยู่ (ยังไม่จบ) */
  open(repId){
    return this.all(repId).filter(l => this.isOpen(l.id));
  },

  /* นับจำนวนตามขั้น — ไว้ทำ funnel */
  funnel(repId){
    const out = {};
    STAGES.forEach(s => out[s.id] = 0);
    this.all(repId).forEach(l => out[this.stage(l.id)]++);
    return out;
  },

  /* สรุปเหตุผลที่ขายไม่ได้ */
  lossReasons(repId){
    const out = {};
    this.all(repId).forEach(l => {
      const h = this.history(l.id);
      const last = h[h.length-1];
      if (last && (SMAP[last.stage]||{}).dead && last.note) {
        out[last.note] = (out[last.note] || 0) + 1;
      }
    });
    return Object.entries(out).sort((a,b) => b[1] - a[1]);
  }
};

/* ---------------- Boss bar ---------------- */
function bossStats(){
  const g = cfg().goal;
  const gap = Math.max(0, g.target - g.baseline);
  const won = Store.entries().filter(isWon)
    .reduce((s,e) => s + (Number(e.amount)||0), 0);
  const pct = gap ? Math.min(100, won/gap*100) : 0;
  const conv = Math.max(1, Number(g.conversion)||20) / 100;
  const per  = Math.max(1, Number(g.avgDeal)||300000);
  const leadsNeeded = Math.ceil(Math.max(0, gap - won) / (per * conv));
  return { gap, won, pct, leadsNeeded, left: Math.max(0, gap - won) };
}

    if (!all.length) h += `<div class="card"><div class="empty">ยังไม่มีลูกค้า — ไปกดเควสต์ "ทักลูกค้าใหม่" ก่อน</div></div>`;
    else {
      // จัดกลุ่มตามวันที่ทัก = ประวัติว่าแต่ละวันทำอะไรไปบ้าง
      const byDate = {};
      all.forEach(l => (byDate[l.date] = byDate[l.date] || []).push(l));
      Object.keys(byDate).sort().reverse().forEach(d => {
        h += `<div class="h2" style="margin:16px 4px 8px">${thDate(d)} · ${byDate[d].length} เจ้า</div>`;
        h += byDate[d].map(l => leadCard(l)).join('');
      });
    }
  }
  return h;
}

/* offset 0 = สัปดาห์นี้, 1 = สัปดาห์ที่แล้ว */
function buildSummary(offset){
  const label = (offset ? 'สรุปสัปดาห์ที่แล้ว' : 'สรุปสัปดาห์นี้') + ' (' + weekLabel(offset) + ')';
  const list = publicReps().map(r => ({
    r, pts: weekPoints(r.id,offset),
    st: streakOf(r.id),
    q: QUESTS.map(q => ({ q, c: questCount(r.id,q,offset) })),
    min: hitMin(r.id,offset), max: hitMax(r.id,offset)
  })).sort((a,b) => b.pts - a.pts);
  list.forEach(x => x.leads = x.q[0].c);

  const totalLeads = list.reduce((s,x) => s + x.leads, 0);
  const b = bossStats();
  const medal = ['🥇','🥈','🥉'];

  let t = `🎮 SALES QUEST — ${label}\n━━━━━━━━━━━━━━━\n`;
  list.forEach((x,i) => {
    t += `${medal[i]||(i+1)+'.'} ${x.r.name} — ${x.pts} แต้ม ${x.max?'🏆':x.min?'✅':'⚠️'}\n`;
    t += `   ${x.q.map(o => o.q.icon + ' ' + o.c + '/' + o.q.min).join(' | ')} | 🔥 ${x.st} สัปดาห์\n`;
  });
  t += `━━━━━━━━━━━━━━━\n🎯 ลูกค้าใหม่รวม ${totalLeads} เจ้า\n`;

  // สถานะรวมของทีม (ไม่รวมโหมดส่วนตัว)
  const tf = {};
  STAGES.forEach(s => tf[s.id] = 0);
  publicReps().forEach(r => {
    const f = Lead.funnel(r.id);
    STAGES.forEach(s => tf[s.id] += f[s.id]);
  });
  const active = STAGES.filter(s => tf[s.id] > 0);
  if (active.length) t += `📊 ${active.map(s => s.icon + ' ' + s.label + ' ' + tf[s.id]).join(' | ')}\n`;

  const dueAll = publicReps().reduce((n,r) => n + Lead.needUpdate(r.id).length, 0);
  if (dueAll) t += `🔔 ค้างตามผล ${dueAll} เจ้า\n`;

  t += `👹 เป้า ${baht(cfg().goal.target)}: ${b.pct.toFixed(1)}% (เหลือ ${baht(b.left)})\n`;
  t += `   ต้องหาลูกค้าใหม่อีก ~${b.leadsNeeded} เจ้า\n\n`;

  const behind = list.filter(x => !x.min);
  const top  = list[0];
  if (behind.length) t += `⚠️ ยังไม่ครบขั้นต่ำ: ${behind.map(x => x.r.name).join(', ')}\n`;
  if (top && top.pts > 0) t += `🏆 ผู้นำตอนนี้: ${top.r.name}\n`;
  t += `\nเป้าขั้นต่ำต่อสัปดาห์: ${QUESTS.map(q => q.icon + ' ' + q.title + ' ' + q.min).join(' · ')} 💪`;
  return t;
}
function viewSum(){
  const d = buildSummary(0), w = buildSummary(1);
  const u = me();

  /* ---- funnel ของตัวเอง: ทักไปทั้งหมด ตายตรงไหน ---- */
  const fn = Lead.funnel(u.id);
  const total = Lead.all(u.id).length;
  const maxV = Math.max(1, ...Object.values(fn));
  let h = `<div class="h2">ลูกค้าของคุณไปถึงไหนบ้าง (${total} เจ้า)</div><div class="card">`;
  h += total
    ? STAGES.map(s => `<div class="fn">
        <span class="fi">${s.icon}</span>
        <span class="fl">${s.label}</span>
        <span class="fb"><i style="width:${fn[s.id]/maxV*100}%;background:${s.color}"></i></span>
        <span class="fv" style="color:${fn[s.id]?s.color:'var(--tx3)'}">${fn[s.id]}</span>
      </div>`).join('')
    : '<div class="empty">ยังไม่มีข้อมูล</div>';
  h += `</div>`;

  /* ---- เหตุผลที่ขายไม่ได้ ---- */
  const lr = Lead.lossReasons(u.id);
  if (lr.length){
    const lmax = Math.max(...lr.map(x => x[1]));
    h += `<div class="h2">ทำไมถึงขายไม่ได้</div><div class="card">
      ${lr.map(([r,n]) => `<div class="fn">
        <span class="fl" style="width:150px;font-size:12.5px">${esc(r)}</span>
        <span class="fb"><i style="width:${n/lmax*100}%;background:var(--red)"></i></span>
        <span class="fv">${n}</span></div>`).join('')}
      <div class="mut3" style="font-size:11.5px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)">
        เหตุผลที่เจอบ่อยสุดคือจุดที่ควรแก้ก่อน</div>
    </div>`;
  }

  /* ---- ย้อนหลัง 8 สัปดาห์ของตัวเอง ---- */
  h += `<div class="h2">ย้อนหลังของคุณ</div><div class="card">`;
  let any = false;
  for (let i = 0; i < 8; i++){
    const counts = QUESTS.map(q => questCount(u.id,q,i));
    const total = counts.reduce((a,b) => a+b, 0);
    if (!total && i > 0) continue;
    any = true;
    const min = hitMin(u.id,i), max = hitMax(u.id,i);
    h += `<div class="log"><span class="li">${max?'🏆':min?'✅':'·'}</span>
      <div class="grow"><b>${i===0?'สัปดาห์นี้':i===1?'สัปดาห์ที่แล้ว':weekLabel(i)}</b>
        <div class="mut3" style="font-size:11.5px">
          ${QUESTS.map((q,j) => q.icon + ' ' + counts[j] + '/' + q.min).join(' · ')}</div></div>
      <span class="lt">${weekPoints(u.id,i)} แต้ม</span></div>`;
  }
  if (!any) h += '<div class="empty">ยังไม่มีกิจกรรม</div>';
  h += `</div>`;

  return h + `<div class="h2">สรุปอัตโนมัติ — พร้อมส่งเข้า Line</div>
    <div class="card"><div class="row" style="margin-bottom:10px"><b>📅 สัปดาห์นี้</b>
      <span class="pill mut3" style="margin-left:auto;background:rgba(255,255,255,.06)">ไม่รวมโหมดส่วนตัว</span></div>
      <pre class="sum" id="sumD">${esc(d)}</pre>
      <button class="copy" onclick="copySum('sumD')">📋 ก๊อปส่งเข้า Line</button></div>
    <div class="card"><div class="row" style="margin-bottom:10px"><b>🗓 สัปดาห์ที่แล้ว</b></div>
      <pre class="sum" id="sumW">${esc(w)}</pre>
      <button class="copy" onclick="copySum('sumW')">📋 ก๊อปส่งเข้า Line</button></div>`;
}

function modal(html){
  const m = document.createElement('div');
  m.className = 'mask';
  m.innerHTML = `<div class="modal">${html}</div>`;
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  document.body.appendChild(m);
  return m;
}
const closeModal = () => document.querySelectorAll('.mask').forEach(m => m.remove());

/* เลือก / สลับโปรไฟล์ */
function pickUser(){
  closeModal();
  const m = modal(`<div class="mt">คุณคือใคร?</div><div class="ms">เลือกโปรไฟล์เซลของคุณ</div>
    ${reps().map(r => `<button class="pick" onclick="chooseUser('${r.id}')">
      <span class="av2" style="background:${r.color};color:${txtOn(r.color)}">${r.name.charAt(0)}</span>
      <span class="grow"><b style="font-size:15px">${esc(r.name)}</b>
        <div class="mut3" style="font-size:12px">${esc(r.role)}${r.private?' · 🔒 ต้องใส่ PIN':''}</div></span>
    </button>`).join('')}`);
  return m;
}
function chooseUser(id){
  const r = rep(id);
  if (r.private){
    closeModal();
    modal(`<div class="mt">🔒 โหมดส่วนตัว</div>
      <div class="ms">สถิติของ ${esc(r.name)} จะไม่ถูกนับใน Leaderboard และไม่โผล่ในสรุปที่ส่งเข้า Line</div>

function saveStage(leadId, stageId, reason){
  const s = SMAP[stageId];
  const e = { rep:me().id, date:today(), type:'status', ref:leadId, stage:stageId };
  if (reason) e.note = reason;
  if (s.won){
    const a = Number(($('#sAmt')||{}).value || 0);
    if (!a || a <= 0){ toast('ใส่ยอดด้วยครับ'); return; }
    e.amount = a;
  }
  Store.add(e);
  closeModal();
  render();
  if (s.won){ confetti(); toast('ปิดได้ ' + Number(e.amount).toLocaleString() + ' ฿ 🎉', true); }
  else toast(s.icon + ' อัปเดตเป็น "' + s.label + '"');
}

function commit(e){
  const beforeMin = hitMin(e.rep, 0), beforeMax = hitMax(e.rep, 0);
  const quest = TYPE2QUEST[e.type];
  const beforeQ = quest ? questCount(e.rep, quest, 0) : 0;

  Store.add(e);
  render();

  if (e.type === 'deal'){ toast('ปิดได้อีก ' + Number(e.amount).toLocaleString() + ' ฿ 🎉', true); return; }
  if (!quest){ toast('บันทึกแล้ว'); return; }

  const c = questCount(e.rep, quest, 0);
  if (!beforeMax && hitMax(e.rep,0)){ confetti(); toast('ถึงเป้าเยี่ยมทุกข้อ! +' + (BONUS+MAX_BONUS) + ' โบนัส 🏆', true); }
  else if (!beforeMin && hitMin(e.rep,0)){ confetti(); toast('ครบเป้าสัปดาห์นี้แล้ว! +' + BONUS + ' โบนัส 🎊', true); }
  else if (beforeQ < quest.min && c >= quest.min){ confetti(); toast(quest.title + ' ครบขั้นต่ำแล้ว! ✅', true); }
  else toast('+' + quest.pts + ' แต้ม · เหลืออีก ' + Math.max(0, quest.min - c) + ' ครบขั้นต่ำ');
}

/* =====================================================================
   Setup link: ส่งค่าเชื่อม Google Sheet ผ่านลิงก์ แทนที่จะฝังไว้ในไฟล์
   เพราะ repo บน GitHub Pages เป็น public — ฝังโทเคนไว้เท่ากับเปิดให้ใครก็อ่านข้อมูลได้
   ตั้มส่งลิงก์นี้ให้เซลทางไลน์ครั้งเดียว เครื่องเขาจำเอง
   ===================================================================== */
const Setup = {
  enc(s){
    return btoa(String.fromCharCode.apply(null, new TextEncoder().encode(s)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  },
  dec(s){
    const b = atob(s.replace(/-/g,'+').replace(/_/g,'/'));
    return new TextDecoder().decode(Uint8Array.from(b, c => c.charCodeAt(0)));
  },

  PREFIX: 'https://script.google.com/macros/s/',
  SUFFIX: '/exec',

  /* ลิงก์แบบสั้น #s=<scriptId>.<token> — สั้นพอที่จะทำ QR ให้สแกนง่าย */
  link(){
    const c = cfg();
    const id = c.syncUrl.replace(this.PREFIX,'').replace(this.SUFFIX,'');
    return location.origin + location.pathname + '#s=' + id + '.' + c.syncToken;
  },

  /* อ่านค่าเชื่อมจากข้อความ (ลิงก์เต็มก็ได้ เฉพาะส่วน hash ก็ได้) */
  fromText(text){
    const c = cfg();
    let got = false;

    const s = String(text).match(/[#&]s=([A-Za-z0-9\-_]+)\.([A-Za-z0-9\-_]+)/);
    if (s){
      c.syncUrl = this.PREFIX + s[1] + this.SUFFIX;
      c.syncToken = s[2];
      got = true;
    }
    if (!got){
      const m = String(text).match(/setup=([A-Za-z0-9\-_]+)/);
      if (m){
        try{
          const d = JSON.parse(this.dec(m[1]));
          if (d.u) c.syncUrl = d.u;
          if (d.t) c.syncToken = d.t;
          got = true;
        }catch(e){ /* ลิงก์เสีย */ }
      }
    }
    if (got) Store.saveCfg(c);
    return got;
  },

  /* วางลิงก์เข้ามาเอง — จำเป็นบน iPhone เพราะแอปบนหน้าจอโฮม
     ใช้ที่เก็บข้อมูลคนละที่กับ Safari ค่าที่สแกน QR ใน Safari จึงไม่ข้ามมา */
  paste(){
    modal(`<div class="mt">🔗 วางลิงก์ตั้งค่า</div>
      <div class="ms">ก๊อปลิงก์ที่หัวหน้าส่งให้ในไลน์ แล้ววางในช่องนี้ กดเชื่อมครั้งเดียวจบ</div>
      <label>ลิงก์ตั้งค่า</label>
      <input class="inp" id="pLink" placeholder="วางลิงก์ที่นี่..." autocomplete="off">
      <button class="btn gh" style="width:100%;flex:none;margin-top:9px" onclick="Setup.readClip()">📋 ดึงจากคลิปบอร์ดให้เลย</button>
      <div class="btns"><button class="btn gh" onclick="closeModal()">ยกเลิก</button>
        <button class="btn gold" onclick="Setup.applyPasted()">เชื่อมเลย</button></div>`);
    setTimeout(() => { const el = $('#pLink'); if (el){ el.focus();
      el.onkeydown = e => { if (e.key === 'Enter') Setup.applyPasted(); }; } }, 60);
  },

  async readClip(){
    try{
      const t = await navigator.clipboard.readText();
      if (!t){ toast('คลิปบอร์ดว่าง'); return; }
      $('#pLink').value = t;
      toast('ดึงมาแล้ว กดเชื่อมเลยได้');
    }catch(e){
      toast('ดึงอัตโนมัติไม่ได้ — กดค้างในช่องแล้ว "วาง" ครับ');
    }
  },

  applyPasted(){
    const v = ($('#pLink').value || '').trim();
    if (!v){ toast('ยังไม่ได้วางลิงก์'); return; }
    if (!this.fromText(v)){
      toast('ลิงก์ไม่ถูกต้อง — ต้องมี #s= อยู่ข้างใน');
      return;
    }
    closeModal();
    toast('เชื่อมแล้ว กำลังซิงก์… ✅', true);
    Sync.push(); Sync.pull();
    render();
  },

  /* อ่านค่าจาก URL ตอนเปิดแอป แล้วลบ hash ทิ้งทันที ไม่ให้ค้างในประวัติเบราว์เซอร์ */
  apply(){
    const c = cfg();
    let got = false;

    // แบบสั้น (ใหม่)
    const s = location.hash.match(/[#&]s=([A-Za-z0-9\-_]+)\.([A-Za-z0-9\-_]+)/);
    if (s){
      c.syncUrl = this.PREFIX + s[1] + this.SUFFIX;
      c.syncToken = s[2];
      got = true;
    }

    // แบบเดิม #setup=<base64> — ยังรองรับ เผื่อมีคนเก็บลิงก์เก่าไว้
    if (!got){
      const m = location.hash.match(/setup=([A-Za-z0-9\-_]+)/);
      if (m){
        try{
          const d = JSON.parse(this.dec(m[1]));
          if (d.u) c.syncUrl = d.u;
          if (d.t) c.syncToken = d.t;
          got = true;
        }catch(e){ /* ลิงก์เสีย ปล่อยผ่าน */ }
      }
    }

    if (location.hash) history.replaceState(null, '', location.pathname);
    if (!got) return false;
    Store.saveCfg(c);
    return true;
  },

  share(){
    const c = cfg();
    if (!c.syncUrl){ toast('ยังไม่ได้ตั้งค่า Google Sheet'); return; }
    const url = this.link();
    modal(`<div class="mt">🔗 ลิงก์ตั้งค่าสำหรับเซล</div>
      <div class="ms">ส่งลิงก์นี้ให้เซลทางไลน์ กดครั้งเดียว เครื่องเขาจำเลย ไม่ต้องกรอกอะไร</div>
      <pre class="sum" style="font-size:11px">${esc(url)}</pre>
      <div class="warn" style="margin-top:12px">🔒 ลิงก์นี้มีกุญแจเข้าข้อมูล — ส่งเฉพาะคนในทีม อย่าโพสต์ที่สาธารณะ</div>
      <div class="btns"><button class="btn gh" onclick="closeModal()">ปิด</button>
        <button class="btn" onclick="copyText('${url.replace(/'/g,"\\'")}')">📋 ก๊อปลิงก์</button></div>`);
  }
};

function copyText(t){
  const done = () => toast('ก๊อปแล้ว ✅');
  if (navigator.clipboard) navigator.clipboard.writeText(t).then(done).catch(fb); else fb();
  function fb(){
    const ta = document.createElement('textarea');
    ta.value = t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); done(); }catch(e){ toast('ก๊อปไม่ได้ กดค้างเลือกเองครับ'); }
    ta.remove();
  }
}

/* =====================================================================
   Lock: รหัสผ่านทั้งแอป
   กันคนที่ได้ลิงก์ไปเปิดดูข้อมูลลูกค้า/ยอดขาย
   ⚠️ นี่คือการล็อกฝั่งหน้าเว็บ กันคนทั่วไปได้ แต่ไม่ได้กันคนที่เก่งเทคนิคจริงๆ
      ถ้าต้องการความปลอดภัยระดับนั้นต้องมี server ตรวจรหัส ซึ่งเกินจำเป็นสำหรับงานนี้
   ===================================================================== */
const Lock = {
  K_HASH:'sq_pass', K_OK:'sq_unlocked',

  async hash(s){
    const salt = 'sales-quest::';
    if (window.crypto && crypto.subtle && window.isSecureContext){
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt + s));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
    }
    // สำรอง: เปิดผ่าน file:// ที่ไม่มี crypto.subtle
    let h = 0, str = salt + s;
    for (let i=0;i<str.length;i++){ h = (h << 5) - h + str.charCodeAt(i); h |= 0; }
    return 'x' + (h >>> 0).toString(16);
  },

  isSet(){ return !!localStorage.getItem(this.K_HASH); },
  unlocked(){ return localStorage.getItem(this.K_OK) === '1'; },

  screen(html){
    const el = document.createElement('div');
    el.className = 'lock';
    el.id = 'lockScreen';
    el.innerHTML = `<img src="icons/icon-192.png" alt="MK">${html}`;
    document.body.appendChild(el);
    return el;
  },
  clear(){ const el = $('#lockScreen'); if (el) el.remove(); },

  /* ตั้งรหัสครั้งแรก */
  setup(){
    this.clear();
    this.screen(`<h1>ตั้งรหัสผ่าน</h1>
      <p>ตั้งรหัสสำหรับเปิดแอปนี้ ใส่ครั้งเดียวต่อเครื่อง<br>จำไว้ให้ดีนะครับ</p>
      <input class="inp" id="p1" type="password" inputmode="numeric" placeholder="รหัสใหม่" autocomplete="new-password">
      <input class="inp" id="p2" type="password" inputmode="numeric" placeholder="ยืนยันอีกครั้ง" autocomplete="new-password" style="margin-top:10px">
      <button class="btn gold" id="pGo">เริ่มใช้งาน</button>
      <div class="err" id="pErr"></div>`);
    const go = async () => {
      const a = $('#p1').value.trim(), b = $('#p2').value.trim();
      if (a.length < 4){ $('#pErr').textContent = 'รหัสต้องยาวอย่างน้อย 4 ตัว'; return; }
      if (a !== b){ $('#pErr').textContent = 'รหัสสองช่องไม่ตรงกัน'; return; }
      localStorage.setItem(this.K_HASH, await this.hash(a));
      localStorage.setItem(this.K_OK, '1');
      this.clear(); boot();
      toast('ตั้งรหัสเรียบร้อย 🔐', true);
    };
    $('#pGo').onclick = go;
    $('#p2').onkeydown = e => { if (e.key === 'Enter') go(); };
    $('#p1').focus();
  },

  /* ใส่รหัสเพื่อเข้า */
  ask(){
    this.clear();
    this.screen(`<h1>Sales Quest</h1>
      <p>ใส่รหัสผ่านเพื่อเข้าใช้งาน</p>
      <input class="inp" id="p1" type="password" inputmode="numeric" placeholder="รหัสผ่าน" autocomplete="current-password">
      <button class="btn gold" id="pGo">ปลดล็อก</button>
      <div class="err" id="pErr"></div>
      <button class="link" id="pForgot">ลืมรหัสผ่าน?</button>`);
    const go = async () => {
      const v = $('#p1').value.trim();
      if (await this.hash(v) === localStorage.getItem(this.K_HASH)){
        localStorage.setItem(this.K_OK, '1');
        this.clear(); boot();
        return;
      }
      $('#pErr').textContent = 'รหัสไม่ถูกต้อง';
      $('#lockScreen').classList.add('shake');
      setTimeout(() => $('#lockScreen') && $('#lockScreen').classList.remove('shake'), 420);
      $('#p1').value = ''; $('#p1').focus();
    };
    $('#pGo').onclick = go;
    $('#p1').onkeydown = e => { if (e.key === 'Enter') go(); };
    $('#pForgot').onclick = () => {
      if (!confirm('ตั้งรหัสใหม่ ต้องล้างข้อมูลในเครื่องนี้ก่อน\n\nถ้าเคยต่อ Google Sheet ไว้ ข้อมูลยังอยู่ครบ ซิงก์กลับมาได้\nถ้าไม่เคยต่อ ข้อมูลจะหายถาวร\n\nยืนยันล้าง?')) return;
      localStorage.clear();
      location.reload();
    };
    $('#p1').focus();
  },

  /* เรียกตอนเปิดแอป — คืน true ถ้าผ่านแล้ว */
  gate(){
    if (!this.isSet()){ this.setup(); return false; }
    if (!this.unlocked()){ this.ask(); return false; }
    return true;
  },

  /* เปลี่ยนรหัสจากหน้าตั้งค่า */
  change(){
    modal(`<div class="mt">🔐 เปลี่ยนรหัสผ่าน</div>
      <div class="ms">ต้องใส่รหัสเดิมก่อน</div>
      <label>รหัสเดิม</label><input class="inp" id="cOld" type="password">
      <label>รหัสใหม่</label><input class="inp" id="cNew" type="password">
      <label>ยืนยันรหัสใหม่</label><input class="inp" id="cNew2" type="password">
      <div class="btns"><button class="btn gh" onclick="closeModal()">ยกเลิก</button>
        <button class="btn" id="cGo">เปลี่ยนรหัส</button></div>`);
    $('#cGo').onclick = async () => {
      if (await this.hash($('#cOld').value.trim()) !== localStorage.getItem(this.K_HASH)){
        toast('รหัสเดิมไม่ถูกต้อง'); return;
      }
      const n = $('#cNew').value.trim();
      if (n.length < 4){ toast('รหัสใหม่ต้องยาวอย่างน้อย 4 ตัว'); return; }
      if (n !== $('#cNew2').value.trim()){ toast('รหัสใหม่สองช่องไม่ตรงกัน'); return; }
      localStorage.setItem(this.K_HASH, await this.hash(n));
      closeModal(); toast('เปลี่ยนรหัสแล้ว 🔐', true);
    };
  },

  /* ล็อกเครื่องนี้ (ไม่ลบข้อมูล) */
  lockNow(){
    localStorage.removeItem(this.K_OK);
    location.reload();
  }
};

/* ---------------- PWA: ติดตั้งลงหน้าจอโฮม ---------------- */
const PWA = {
  prompt: null,
  standalone(){
    return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  },
  isIOS(){
    return /iphone|ipad|ipod/i.test(navigator.userAgent)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  },
  show(){ $('#installBar').classList.remove('hide'); },
  hide(){ $('#installBar').classList.add('hide'); },

  init(){
    if (this.standalone() || localStorage.getItem('sq_install_off')) return;

    // Android / Chrome / Edge — มี prompt ให้เรียกได้
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      this.prompt = e;
      this.show();
    });
    window.addEventListener('appinstalled', () => { this.hide(); toast('ติดตั้งแล้ว! 🎉', true); });

    // iOS Safari ไม่มี prompt ต้องบอกวิธีเอง
    if (this.isIOS()) setTimeout(() => this.show(), 1200);

    $('#installBtn').onclick = async () => {
      if (this.prompt){
        this.prompt.prompt();
        const { outcome } = await this.prompt.userChoice;
        this.prompt = null;
        if (outcome === 'accepted') this.hide();
        return;
      }
      // ไม่มี prompt (iOS หรือเบราว์เซอร์ไม่รองรับ) → สอนวิธี
      modal(`<div class="mt">📲 ติดตั้งลงหน้าจอโฮม</div>
        <div class="ms">ทำครั้งเดียว แล้วเปิดจากไอคอนได้เลยเหมือนแอปจริง</div>
        ${this.isIOS()
          ? `<div class="card" style="margin:0">
               <div class="log"><span class="li">1️⃣</span><div class="grow">กดปุ่ม <b>แชร์</b> ⎋ ด้านล่างจอ Safari</div></div>
               <div class="log"><span class="li">2️⃣</span><div class="grow">เลื่อนหา <b>“เพิ่มไปยังหน้าจอโฮม”</b></div></div>
               <div class="log"><span class="li">3️⃣</span><div class="grow">กด <b>เพิ่ม</b> มุมขวาบน — เสร็จ!</div></div>
             </div>
             <div class="warn" style="margin-top:12px">⚠️ ต้องเปิดด้วย <b>Safari</b> เท่านั้น ถ้าเปิดใน Chrome/Line จะไม่มีเมนูนี้</div>`
          : `<div class="card" style="margin:0">
               <div class="log"><span class="li">1️⃣</span><div class="grow">กดเมนู <b>⋮</b> มุมขวาบนของเบราว์เซอร์</div></div>
               <div class="log"><span class="li">2️⃣</span><div class="grow">เลือก <b>“ติดตั้งแอป”</b> หรือ <b>“เพิ่มลงในหน้าจอหลัก”</b></div></div>
             </div>`}
        <div class="btns"><button class="btn" onclick="closeModal()">เข้าใจแล้ว</button></div>`);
    };
    $('#installX').onclick = () => { localStorage.setItem('sq_install_off','1'); this.hide(); };
  }
};

/* service worker — ให้เปิดได้ตอนไม่มีเน็ต (ต้องรันผ่าน http/https ไม่ใช่ file://) */
if ('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ---------------- boot ---------------- */
let booted = false;
function boot(){
  if (booted) return;
  booted = true;

  document.querySelectorAll('.nb button').forEach(b =>
    b.onclick = () => { TAB = b.dataset.tab; render(); });
  $('#whoBtn').onclick = () => pickUser();

  /* ตั้งแต่เวอร์ชันนี้ ชีทเป็นฐานข้อมูลจริง เครื่องเป็นแค่สำเนา
     ล้างของเก่าที่ค้างในเครื่องทิ้งรอบเดียวต่อเครื่อง แล้วดึงใหม่จากชีท
     (ข้ามถ้ายังไม่ได้เชื่อมชีท ไม่งั้นข้อมูลหายโดยไม่มีที่ดึงกลับ) */
  if (cfg().syncUrl && localStorage.getItem('sq_dataver') !== '2'){
    Store.setEntries([]); Store.setQueue([]);
    localStorage.setItem('sq_dataver','2');
  }

  render();
  PWA.init();
  Sync.push();          // ส่งของที่ค้างจากรอบก่อน (เช่น เน็ตหลุดตอนปิดแอป) ก่อนเลย
  Sync.pull(true);
  setInterval(() => { if (cfg().syncUrl){ Sync.push(); Sync.pull(true); } }, 60000);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden){ Sync.push(); Sync.pull(true); }
  });
  window.addEventListener('online', () => { Sync.push(); Sync.pull(true); });
}

Setup.apply();          // รับค่าเชื่อม Sheet จากลิงก์ (ถ้ามี) ก่อนอย่างอื่น
if (Lock.gate()) boot();
</script>
